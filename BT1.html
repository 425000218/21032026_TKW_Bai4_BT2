<!-- Khai báo loại tài liệu HTML5 -->
<!DOCTYPE html>
<!-- Thẻ gốc của trang HTML, ngôn ngữ tiếng Việt -->
<html lang="vi">
    <!-- Phần đầu của tài liệu, chứa metadata -->
    <head>
        <!-- Đặt mã hóa ký tự UTF-8 -->
        <meta charset="UTF-8">
        <!-- Thiết lập viewport cho responsive design -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Tiêu đề trang hiển thị trên tab trình duyệt -->
        <title>Bài Tập 1 - About Us Page</title>
        <!-- Liên kết đến file CSS -->
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <!-- Phần thân của trang -->
    <body>
        <!-- Navigation bar -->
        <nav class="navbar">
            <a href="index.html" style="font-weight: bold;">🏠 Home</a>
            <a href="BT1.html">BT1</a>
            <a href="BT2.html">BT2</a>
            <a href="BT3.html">BT3</a>
            <a href="BT4.html">BT4</a>
        </nav>
        <!-- Header của trang với class site-header -->
        <header class="site-header">
            <!-- Container bên trong header -->
            <div class="header-inner">
                <!-- Tiêu đề chính của trang -->
                <h1>About Us Page</h1>
                <!-- Đoạn mô tả ngắn -->
                <p>Chúng tôi là một đội ngũ sáng tạo luôn nỗ lực mang lại sản phẩm chất lượng cao và giá trị thực tế.</p>
            </div>
        </header>
        <!-- Section giới thiệu đội ngũ -->
        <section class="our-team">
            <!-- Tiêu đề section -->
            <h2>Our Team</h2>
            <!-- Danh sách thành viên đội ngũ -->
            <div class="team-list">
                <!-- Card thành viên đầu tiên -->
                <article class="team-card">
                    <!-- Ảnh đại diện -->
                    <img src="images/team1.jpg" alt="Jane Doe">
                    <!-- Tên thành viên -->
                    <h3>Jane Doe</h3>
                </article>
                <!-- Card thành viên thứ hai -->
                <article class="team-card">
                    <!-- Ảnh đại diện -->
                    <img src="images/team2.jpg" alt="Mike Ross">
                    <!-- Tên thành viên -->
                    <h3>Mike Ross</h3>
                </article>
                <!-- Card thành viên thứ ba -->
                <article class="team-card">
                    <!-- Ảnh đại diện -->
                    <img src="images/team3.jpg" alt="John Doe">
                    <!-- Tên thành viên -->
                    <h3>John Doe</h3>
                </article>
            </div>
        </section>
    </body>
</html>
